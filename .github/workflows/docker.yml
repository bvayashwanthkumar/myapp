name: Java CI

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: mvn package

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - run: docker build -t myapp4 .

      - run: docker tag myapp4 ghcr.io/${{ github.repository_owner }}/myapp4:latest

      - run: docker push ghcr.io/${{ github.repository_owner }}/myapp4:latest